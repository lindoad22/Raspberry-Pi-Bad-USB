<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Script Edit</title>
</head>
<body>
    <div id="wrapper">
        <div id="menu">
                <a class="active" href="/script_edit">edit scripts</a>
                <a href="/logbook">see logs</a>
                <a href="/">settings</a>
            </div>

        <div id="script_card">
            
            <div id="script_list">
                <div id="script_header">
                    <h2>Payloads</h2>
                    <div class="divider"></div>
                </div>
                {list_item}
            </div>
            
            <div id="edit_script">
                <form method="POST" enctype="application/x-www-form-urlencoded">

                    <div>
                        <label for="name">Script Name</label>
                        <input id="name" name="name" type="text" value="{script_name}">
                    </div>
                    <textarea id="script" name="script" id="textarea_script">{script}</textarea>
                    <div>
                        <label for="new_script">New Script</label>
                        <input name="new_script" type="checkbox">
                    </div>
                    <div>
                        <label for="active_script">Active Script</label>
                        <input name="active_script" type="checkbox" {check}>
                    </div>

                    <div>
                        <label for="delete_script">Delete</label>
                        <input name="delete_script" type="checkbox">
                    </div>

                    <input id="script_id" name="script_id" type="hidden" value="{sc_id}">
                    
                    <div class="divider"></div>
                    <div class="button_div">
                        <button type="submit">send</button>
                    </div>
                </form>
                
                {message}
            </div>
            
        </div>

    </div>

</body>
</html>
